name: DevFocus Health
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  devfocus-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.EC2_REGION }}

      - name: Get runner public IP
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> "$GITHUB_OUTPUT"

      - name: Open SSH to runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Checking Health Of DevFocus
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_PRIVATE_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          echo "StrictHostKeyChecking=no" >> ~/.ssh/config
          
          ssh -o ConnectTimeout=15 -i ~/.ssh/ec2_key.pem "ubuntu@$EC2_HOST" '
            for i in $(seq 1 12); do
              if curl -sf http://localhost:$LOCALHOST_PORT/actuator/health; then
                echo " — healthy after ${i}0s"
                exit 0
              fi
              echo "Attempt $i: not up yet, waiting..."
              sleep 10
            done
            echo "App failed to become healthy within 120s"
            exit 1
          '
          
      - name: Close SSH rule
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32